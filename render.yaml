services:
  - type: web
    name: red-humanitaria-api
    runtime: docker
    plan: starter
    region: oregon  # US West — buena latencia para Venezuela
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    numInstances: 1

    disk:
      name: data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: APP_NAME
        value: Red Humanitaria de Datos
      - key: NODE_ID
        value: render-nodo
      - key: DATABASE_PATH
        value: /data/index.db
      - key: AUTO_SYNC_ENABLED
        value: "1"
      - key: AUTO_SYNC_INTERVAL_SECONDS
        value: "21600"
      - key: AUTO_SYNC_SOURCE_LIMIT
        value: "5000"
      - key: AUTO_SYNC_MAX_PAGES
        value: "10"
      - key: PROPOSALS_ENABLED
        value: "1"
      - key: PROPOSAL_RATE_LIMIT
        value: "5"
      - key: READ_RATE_LIMIT_PER_MIN
        value: "120"
      - key: READ_CACHE_SECONDS
        value: "30"
      - key: DEFAULT_SOURCE_LIMIT
        value: "1000"
      - key: DEFAULT_MAX_PAGES
        value: "5"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "15"
      - key: SQLITE_BUSY_TIMEOUT_MS
        value: "5000"
      - key: FEDERATION_PULL_ENABLED
        value: "0"
      - key: ALLOW_OPEN_WRITES
        value: "0"
      - key: PORT
        value: "8000"

      # ⚠️ CLAVES — generá un valor seguro para cada una antes del primer deploy.
      # Podés generarlas con: openssl rand -hex 24
      - key: INGEST_API_KEY
        sync: false
        value: cambia_esto_por_una_clave_segura
      - key: ADMIN_API_KEY
        sync: false
        value: cambia_esto_por_una_clave_segura
      - key: HOSPITALES_API_KEY
        sync: false
        value: pega_aqui_tu_clave_real
