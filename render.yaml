services:
  - type: web
    name: curalink-red-ayuda-api
    runtime: docker
    plan: starter
    region: oregon  # US West — buena latencia para Venezuela
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    numInstances: 1

    disk:
      name: data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: APP_NAME
        value: Red Humanitaria de Datos
      - key: NODE_ID
        value: render-nodo
      - key: DATABASE_PATH
        value: /data/index.db
      - key: AUTO_SYNC_ENABLED
        value: "1"
      - key: AUTO_SYNC_INTERVAL_SECONDS
        value: "21600"
      - key: AUTO_SYNC_SOURCE_LIMIT
        value: "5000"
      - key: AUTO_SYNC_MAX_PAGES
        value: "10"
      - key: PROPOSALS_ENABLED
        value: "1"
      - key: PROPOSAL_RATE_LIMIT
        value: "5"
      - key: READ_RATE_LIMIT_PER_MIN
        value: "120"
      - key: READ_CACHE_SECONDS
        value: "30"
      - key: DEFAULT_SOURCE_LIMIT
        value: "1000"
      - key: DEFAULT_MAX_PAGES
        value: "5"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "15"
      - key: SQLITE_BUSY_TIMEOUT_MS
        value: "5000"
      - key: FEDERATION_PULL_ENABLED
        value: "0"
      - key: ALLOW_OPEN_WRITES
        value: "0"
      - key: PORT
        value: "8000"

      # CLAVES — sync: false hace que Render te pida el valor en el setup.
      # Usá: openssl rand -hex 24 para generar claves seguras.
      - key: INGEST_API_KEY
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      # HOSPITALES_API_KEY sin configurar — el conector de hospitales no sincronizará
      # - key: HOSPITALES_API_KEY
      #   sync: false
