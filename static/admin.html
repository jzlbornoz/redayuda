<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin · Red Humanitaria de Datos</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/tw-config.js"></script>
    <link rel="stylesheet" href="/static/app.css?v=tw3">
    <link rel="icon" href="/static/assets/favicon.png" type="image/png">
  </head>
  <body class="min-h-screen bg-slate-50 font-sans text-slate-900 antialiased">
    <header id="rh-header"></header>

    <main id="main" tabindex="-1" class="mx-auto max-w-5xl px-4 py-8">
      <h1 class="text-2xl sm:text-3xl">Panel de administración</h1>

      <!-- Gate de clave -->
      <section id="gate" class="mt-6 max-w-md rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
        <p class="text-sm text-slate-500">Introduce tu <code class="text-xs">ADMIN_API_KEY</code>. Se guarda solo en esta pestaña (sessionStorage).</p>
        <form id="keyForm" class="mt-3 flex gap-2">
          <input id="keyInput" type="password" autocomplete="off" placeholder="x-admin-key"
                 class="flex-1 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none focus:border-brand focus:ring-2 focus:ring-brand/30">
          <button type="submit" class="rounded-lg bg-brand px-4 py-2 text-sm font-semibold text-white hover:bg-brand-700">Entrar</button>
        </form>
        <p id="gateMsg" class="mt-2 text-sm text-rose-600" aria-live="polite"></p>
      </section>

      <!-- Panel -->
      <section id="panel" hidden>
        <div class="mt-2 flex flex-wrap items-center gap-2 border-b border-slate-200">
          <button data-tab="proposals" class="rh-tab">Propuestas <span id="badgeProposals" class="ml-1 rounded-full bg-ink-900 px-1.5 text-xs font-semibold text-white"></span></button>
          <button data-tab="sources" class="rh-tab">Fuentes</button>
          <button data-tab="peers" class="rh-tab">Peers</button>
          <button id="logoutBtn" class="ml-auto text-sm text-slate-400 hover:text-slate-700">Salir</button>
        </div>

        <div id="adminMsg" class="mt-4" aria-live="polite"></div>

        <div data-pane="proposals" class="mt-4 space-y-3"></div>
        <div data-pane="sources" hidden class="mt-4"></div>
        <div data-pane="peers" hidden class="mt-4"></div>
      </section>
    </main>

    <footer id="rh-footer"></footer>

    <style>
      .rh-tab { padding:.5rem .25rem; margin-right:1.25rem; font-size:.8rem; font-weight:500; text-transform:uppercase; letter-spacing:.05em; color:var(--color-gray); border-bottom:2px solid transparent; }
      .rh-tab[aria-selected="true"] { color:var(--color-black); border-bottom-color:var(--color-black); }
    </style>

    <script src="/static/ui.js?v=tw3" defer></script>
    <script src="/static/shell.js?v=tw3" defer></script>
    <script src="/static/admin.js?v=tw3" defer></script>
  </body>
</html>
