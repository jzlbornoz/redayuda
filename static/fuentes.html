<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fuentes · Red Humanitaria de Datos</title>
    <link rel="icon" href="/static/assets/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/static/assets/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Inicio">
          <span class="brand-mark" aria-hidden="true">HV</span>
          <span>
            <strong>Red Humanitaria de Datos</strong>
            <small>Indexador de datos humanitarios</small>
          </span>
        </a>
        <nav class="top-actions" aria-label="Acciones">
          <a class="ghost-link" href="/">Buscar</a>
          <a class="ghost-link" href="/contribuir">Registrar fuente</a>
          <a class="ghost-link" href="/docs">API docs</a>
        </nav>
      </header>

      <main class="fuentes-main">
        <!-- ===== Vista 1: listado de fuentes ===== -->
        <section id="sourcesView" aria-label="Fuentes registradas">
          <div class="view-head">
            <div>
              <p class="kicker">Red</p>
              <h1 class="view-title">Fuentes registradas</h1>
            </div>
          </div>

          <div class="stat-strip" id="statStrip">
            <div class="stat"><b id="statSources">—</b><span>Fuentes</span></div>
            <div class="stat"><b id="statRecords">—</b><span>Registros</span></div>
            <div class="stat"><b id="statActive">—</b><span>Activas</span></div>
          </div>

          <div class="toolbar">
            <input id="sourceFilter" type="search" autocomplete="off"
                   placeholder="Filtrar fuentes por nombre o tipo…">
            <select id="sourceSort" aria-label="Ordenar fuentes">
              <option value="records">Más registros</option>
              <option value="name">Nombre (A–Z)</option>
              <option value="recent">Sincronización reciente</option>
            </select>
          </div>

          <div id="sourcesMessage" class="message-area"></div>
          <div id="sourcesList" class="sources-grid"></div>
        </section>

        <!-- ===== Vista 2: detalle de una fuente ===== -->
        <section id="recordsView" aria-label="Registros de la fuente" hidden>
          <button id="backButton" class="crumb" type="button">← Todas las fuentes</button>

          <div class="source-detail">
            <h1 class="sd-title" id="sdTitle">—</h1>
            <div class="sd-meta" id="sdMeta"></div>
          </div>

          <form id="recordsSearch" class="records-toolbar">
            <input id="qInput" type="search" autocomplete="off"
                   placeholder="Buscar en esta fuente: nombre, cédula, ciudad…">
            <select id="typeInput" aria-label="Tipo de registro">
              <option value="">Todos los tipos</option>
            </select>
            <select id="limitInput" aria-label="Por página">
              <option value="25">25 / pág.</option>
              <option value="50">50 / pág.</option>
              <option value="100">100 / pág.</option>
            </select>
          </form>

          <p class="records-count" id="recordsCount"></p>
          <div id="recordsMessage" class="message-area"></div>
          <div id="recordsList" class="records-list"></div>

          <div id="pager" class="pager" hidden>
            <span id="pagerLabel" class="pager-label">—</span>
            <span class="pager-btns">
              <button id="prevButton" class="secondary-button" type="button">← Anterior</button>
              <button id="nextButton" class="secondary-button" type="button">Siguiente →</button>
            </span>
          </div>
        </section>
      </main>
    </div>

    <!-- ===== Drawer de detalle de registro ===== -->
    <div id="drawerBackdrop" class="drawer-backdrop"></div>
    <aside id="drawer" class="drawer" aria-label="Detalle del registro" aria-hidden="true">
      <div class="drawer-head">
        <div>
          <h2 class="drawer-title" id="drawerTitle">—</h2>
          <p class="drawer-type" id="drawerType"></p>
        </div>
        <button id="drawerClose" class="drawer-close" type="button" aria-label="Cerrar">×</button>
      </div>
      <div class="drawer-body" id="drawerBody"></div>
    </aside>

    <script src="/static/fuentes.js" defer></script>
  </body>
</html>
