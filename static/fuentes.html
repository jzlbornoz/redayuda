<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fuentes · Red Humanitaria de Datos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/tw-config.js"></script>
    <link rel="stylesheet" href="/static/app.css?v=tw3">
    <link rel="icon" href="/static/assets/favicon.png" type="image/png">
  </head>
  <body class="min-h-screen bg-slate-50 font-sans text-slate-900 antialiased">
    <a class="sr-only focus:not-sr-only focus:absolute focus:left-2 focus:top-2 focus:z-50 focus:rounded focus:bg-white focus:px-3 focus:py-2" href="#main">Saltar al contenido</a>
    <header id="rh-header"></header>

    <main id="main" tabindex="-1" class="mx-auto max-w-6xl px-4 py-8">

      <!-- Vista lista -->
      <section id="sourcesView">
        <h1 class="text-2xl sm:text-3xl">Fuentes conectadas</h1>
        <p class="mt-1 text-slate-500">Las apps y bases que alimentan el índice. El punto junto a cada fuente indica la frescura de su última sincronización.</p>

        <div class="mt-5 grid gap-3 sm:grid-cols-4">
          <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm"><div id="kSources" class="text-2xl font-bold tabular-nums">—</div><div class="text-xs font-medium uppercase tracking-wide text-slate-400">Fuentes</div></div>
          <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm"><div id="kRecords" class="text-2xl font-bold tabular-nums">—</div><div class="text-xs font-medium uppercase tracking-wide text-slate-400">Registros</div></div>
          <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm"><div id="kFresh" class="text-2xl font-bold tabular-nums text-ink-900">—</div><div class="text-xs font-medium uppercase tracking-wide text-slate-400">Al día (&lt;24h)</div></div>
          <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm"><div id="kStale" class="text-2xl font-bold tabular-nums text-ink-900">—</div><div class="text-xs font-medium uppercase tracking-wide text-slate-400">Obsoletas (&gt;7d)</div></div>
        </div>

        <div class="mt-5 flex flex-wrap items-center gap-2">
          <input id="sourceFilter" type="search" autocomplete="off" placeholder="Filtrar fuentes…"
                 class="w-56 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none focus:border-brand focus:ring-2 focus:ring-brand/30">
          <select id="sourceSort" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none focus:border-brand focus:ring-2 focus:ring-brand/30">
            <option value="records">Más registros</option>
            <option value="name">Nombre (A–Z)</option>
            <option value="recent">Sincronización reciente</option>
            <option value="stale">Más rezagadas</option>
          </select>
          <a href="/desarrolladores" class="rh-action ml-auto bg-ink-900 px-4 py-2 text-sm text-white shadow-sm hover:bg-ink-600">Conectar tu app</a>
        </div>

        <div id="sourcesMessage" class="mt-4" aria-live="polite"></div>
        <div id="sourcesList" class="mt-4 grid gap-3 sm:grid-cols-2 lg:grid-cols-3"></div>
      </section>

      <!-- Vista detalle -->
      <section id="recordsView" hidden>
        <button id="backButton" type="button" class="mb-4 inline-flex items-center gap-1 text-sm text-slate-500 hover:text-slate-900">← Todas las fuentes</button>
        <div class="flex flex-wrap items-start justify-between gap-3">
          <div>
            <h1 id="sdTitle" class="text-2xl">—</h1>
            <div id="sdMeta" class="mt-1.5 flex flex-wrap items-center gap-2 text-sm text-slate-500"></div>
          </div>
        </div>

        <form id="recordsSearch" class="mt-5 flex flex-wrap items-center gap-2" novalidate>
          <input id="qInput" type="search" autocomplete="off" placeholder="Buscar en esta fuente…"
                 class="w-56 flex-1 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none focus:border-brand focus:ring-2 focus:ring-brand/30">
          <select id="typeInput" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm"><option value="">Todos los tipos</option></select>
          <button type="submit" class="rounded-lg bg-brand px-4 py-2 text-sm font-semibold text-white hover:bg-brand-700">Buscar</button>
        </form>

        <p id="recordsCount" class="mt-3 text-sm text-slate-400" aria-live="polite"></p>
        <div id="recordsMessage" aria-live="polite"></div>
        <div id="recordsList" class="mt-2 space-y-2"></div>

        <div class="mt-5 flex items-center justify-center gap-3">
          <button id="prevButton" type="button" class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-50 disabled:opacity-40" disabled>Anterior</button>
          <span id="pagerLabel" class="text-sm text-slate-400">—</span>
          <button id="nextButton" type="button" class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-50 disabled:opacity-40" disabled>Siguiente</button>
        </div>
      </section>
    </main>

    <footer id="rh-footer"></footer>

    <!-- Drawer -->
    <div class="drawer" id="recordDrawer" aria-labelledby="drawerTitle" aria-hidden="true">
      <div class="drawer__backdrop" data-drawer-close></div>
      <div class="drawer__panel">
        <div class="flex items-start justify-between gap-3 border-b border-slate-200 p-5">
          <div class="min-w-0"><div id="drawerType" class="mb-1"></div><h2 id="drawerTitle" class="truncate text-lg">Detalle</h2></div>
          <button type="button" data-drawer-close class="grid h-8 w-8 flex-shrink-0 place-items-center rounded-md text-slate-400 hover:bg-slate-100" aria-label="Cerrar">
            <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="m6 6 12 12M18 6 6 18"/></svg>
          </button>
        </div>
        <div id="drawerBody" class="flex-1 overflow-auto p-5"></div>
      </div>
    </div>

    <script src="/static/ui.js?v=tw3" defer></script>
    <script src="/static/shell.js?v=tw3" defer></script>
    <script src="/static/detail.js?v=tw3" defer></script>
    <script src="/static/fuentes.js?v=tw3" defer></script>
  </body>
</html>
