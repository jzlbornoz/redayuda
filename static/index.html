<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Buscar · Red Humanitaria de Datos</title>
    <meta name="description" content="Busca personas desaparecidas, centros de acopio, donación, hospitales y recursos en el índice común de datos humanitarios de Venezuela.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/tw-config.js"></script>
    <link rel="stylesheet" href="/static/app.css?v=tw1">
    <link rel="icon" href="/static/assets/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/static/assets/apple-touch-icon.png">
  </head>
  <body class="min-h-screen bg-slate-50 font-sans text-slate-900 antialiased">
    <a class="sr-only focus:not-sr-only focus:absolute focus:left-2 focus:top-2 focus:z-50 focus:rounded focus:bg-white focus:px-3 focus:py-2" href="#main">Saltar al contenido</a>
    <header id="rh-header"></header>

    <main id="main" tabindex="-1" class="mx-auto max-w-6xl px-4 py-8">

      <!-- ===== Buscador ===== -->
      <section aria-label="Búsqueda">
        <h1 class="text-2xl font-bold tracking-tight sm:text-3xl">¿A quién o qué buscas?</h1>
        <p class="mt-1 text-slate-500">Una sola búsqueda sobre todas las fuentes conectadas: personas, centros de acopio y donación, hospitales y recursos.</p>

        <form id="searchForm" class="mt-5" novalidate>
          <div class="flex flex-col gap-2 sm:flex-row">
            <div class="relative flex-1">
              <span class="pointer-events-none absolute left-3 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
              </span>
              <input id="queryInput" name="q" type="search" autocomplete="off" enterkeyhint="search"
                     class="w-full rounded-xl border border-slate-300 bg-white py-3 pl-10 pr-4 text-base shadow-sm outline-none placeholder:text-slate-400 focus:border-brand focus:ring-2 focus:ring-brand/30"
                     placeholder="Nombre, cédula, centro de acopio, ciudad…" aria-label="Texto de búsqueda">
            </div>
            <button type="submit" class="rounded-xl bg-brand px-6 py-3 text-base font-semibold text-white shadow-sm transition hover:bg-brand-700 focus:ring-2 focus:ring-brand/40">Buscar</button>
          </div>

          <!-- Chips de tipo -->
          <div id="typeChips" class="mt-3 flex flex-wrap gap-2" role="group" aria-label="Filtrar por tipo">
            <button type="button" data-type="" class="rh-chip" aria-pressed="true">Todo</button>
            <button type="button" data-type="persona_desaparecida" class="rh-chip">Desaparecidos</button>
            <button type="button" data-type="persona_localizada" class="rh-chip">Localizados</button>
            <button type="button" data-type="centro_acopio" class="rh-chip">Acopio</button>
            <button type="button" data-type="centro_donacion" class="rh-chip">Donación</button>
            <button type="button" data-type="persona_hospitalizada" class="rh-chip">Hospitales</button>
            <button type="button" data-type="recurso" class="rh-chip">Recursos</button>
          </div>

          <!-- Filtros secundarios -->
          <div class="mt-3 flex flex-wrap items-center gap-2 text-sm">
            <input id="cityInput" name="city" autocomplete="off" placeholder="Ciudad"
                   class="w-36 rounded-lg border border-slate-300 bg-white px-3 py-1.5 outline-none focus:border-brand focus:ring-2 focus:ring-brand/30">
            <select id="sourceInput" name="source_id" class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 outline-none focus:border-brand focus:ring-2 focus:ring-brand/30">
              <option value="">Todas las fuentes</option>
            </select>
            <label class="ml-auto inline-flex items-center gap-2 text-slate-500">
              <input id="dedupInput" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-brand focus:ring-brand/40">
              Agrupar duplicados
            </label>
            <button id="clearButton" type="button" class="rounded-lg px-3 py-1.5 text-slate-500 ring-1 ring-inset ring-slate-200 hover:bg-white">Limpiar</button>
          </div>
        </form>
      </section>

      <div id="messageArea" class="mt-4" aria-live="polite"></div>

      <!-- ===== Estado inicial: pulso + recientes ===== -->
      <section id="homeView" class="mt-8">
        <div class="grid gap-3 sm:grid-cols-3">
          <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
            <div id="statRecords" class="text-2xl font-bold tabular-nums">—</div>
            <div class="text-xs font-medium uppercase tracking-wide text-slate-400">Registros indexados</div>
          </div>
          <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
            <div id="statSources" class="text-2xl font-bold tabular-nums">—</div>
            <div class="text-xs font-medium uppercase tracking-wide text-slate-400">Fuentes conectadas</div>
          </div>
          <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
            <div id="statFresh" class="text-2xl font-bold">—</div>
            <div class="text-xs font-medium uppercase tracking-wide text-slate-400">Última sincronización</div>
          </div>
        </div>

        <div class="mt-8 grid gap-8 lg:grid-cols-[1.4fr_1fr]">
          <div>
            <h2 class="mb-3 text-sm font-semibold uppercase tracking-wide text-slate-500">Añadidos recientemente</h2>
            <div id="recentList" class="space-y-2"></div>
          </div>
          <div>
            <h2 class="mb-3 text-sm font-semibold uppercase tracking-wide text-slate-500">Por tipo</h2>
            <div id="typeBars" class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm"></div>
          </div>
        </div>
      </section>

      <!-- ===== Resultados ===== -->
      <section id="resultsView" hidden class="mt-8" aria-label="Resultados">
        <div class="mb-3 flex flex-wrap items-center gap-3">
          <h2 id="resultsHeading" tabindex="-1" class="text-sm font-semibold uppercase tracking-wide text-slate-500">Resultados</h2>
          <span id="resultCount" class="text-sm text-slate-400" aria-live="polite"></span>
          <span id="resultTime" class="ml-auto text-xs text-slate-400"></span>
        </div>
        <div id="resultsList" class="space-y-2"></div>
        <div class="mt-5 text-center">
          <button id="loadMoreButton" hidden class="rounded-lg border border-slate-300 bg-white px-5 py-2 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50">Cargar más</button>
        </div>
      </section>
    </main>

    <footer id="rh-footer"></footer>

    <!-- Drawer de detalle -->
    <div class="drawer" id="recordDrawer" aria-labelledby="drawerTitle" aria-hidden="true">
      <div class="drawer__backdrop" data-drawer-close></div>
      <div class="drawer__panel">
        <div class="flex items-start justify-between gap-3 border-b border-slate-200 p-5">
          <div class="min-w-0">
            <div id="drawerType" class="mb-1"></div>
            <h2 id="drawerTitle" class="truncate text-lg font-bold">Detalle</h2>
          </div>
          <button type="button" data-drawer-close class="grid h-8 w-8 flex-shrink-0 place-items-center rounded-md text-slate-400 hover:bg-slate-100 hover:text-slate-700" aria-label="Cerrar">
            <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="m6 6 12 12M18 6 6 18"/></svg>
          </button>
        </div>
        <div id="drawerBody" class="flex-1 overflow-auto p-5"></div>
      </div>
    </div>

    <style>
      .rh-chip { border-radius: 9999px; padding: .375rem .875rem; font-size: .8125rem; font-weight: 500;
        border: 1px solid rgb(203 213 225); background: #fff; color: rgb(71 85 105); transition: all .15s; }
      .rh-chip:hover { background: rgb(248 250 252); }
      .rh-chip[aria-pressed="true"] { background: rgb(15 23 42); border-color: rgb(15 23 42); color: #fff; }
    </style>

    <script src="/static/ui.js?v=tw1" defer></script>
    <script src="/static/shell.js?v=tw1" defer></script>
    <script src="/static/app.js?v=tw1" defer></script>
  </body>
</html>
